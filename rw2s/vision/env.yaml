name: rw2s-vision
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10       # Khuyến nghị nâng lên >= 3.10 để tương thích tốt nhất với PyTorch 2.5+
  - numpy=1.26        # (Có thể xem xét nâng cấp nếu gặp cảnh báo Deprecation trong tương lai)
  - dill=0.3.8
  - matplotlib
  - ruamel_yaml
  - wilds
  - pip
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu124  # Cập nhật index lên CUDA 12.4
    - torch>=2.5.0        # Gỡ pin bản 2.1.0, bắt buộc >= 2.5.0 để hỗ trợ kiến trúc Blackwell
    - torchvision>=0.20.0 # Nâng cấp phiên bản tương ứng với PyTorch 2.5.0+
    - datasets~=2.14
    - fire~=0.4
    - torch_optimizer~=0.3
    - wandb~=0.16.1
    - tqdm~=4.66
    - loguru~=0.7.2
    - lovely-tensors~=0.1.17
    - pandas==1.5.3
    - setuptools==80.9.0
    - ruamel.yaml==0.18.15